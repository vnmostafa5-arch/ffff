name: Build Fabric Mod

on: [push, pull_request]

# حل مشكلة تحذير Node 20 وتفعيل النسخة الأحدث تلقائياً
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # تم استبدال ./gradlew بـ gradle المدمج في السيرفر لأن الـ wrapper غير مرفوع
      - name: Build Mod with Global Gradle
        run: gradle build

      - name: Upload Mod Jar
        uses: actions/upload-artifact@v4
        with:
          name: World-Timer-Mod-Jar
          path: build/libs/*.jar
